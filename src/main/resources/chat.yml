# =============================================================================
# CHAT FILTERING SYSTEM
# =============================================================================
chat_filter:
  enabled: true

  permissions:
    bypass_perm: "prismautils.chatfilter.bypass"
    notify_perm: "prismautils.chatfilter.notify"

  normalization:
    nfkc_case_fold: true
    remove_invisibles: true
    max_repeat: 2
    separator_folding: true
    confusable_folding: true
    latin_skeleton_folding: true

  unicode_policy:
    mode: "SCRIPT_WHITELIST"
    allowed_extra_chars: "£§"

  views:
    wordlists:
      allow:
        - spaced
        - compact
      block:
        - spaced
        - compact
      block_embedded:
        - compact
      flag:
        - spaced
        - compact

  commands:
    enabled: true
    monitored_roots:
      - me
      - say
      - vmessage
      - message
      - msg
      - tell
      - whisper
      - pm
      - vreply
      - reply
      - r
      - vme
      - g
      - global
      - net
      - network
      - tr
      - trade
      - local
      - lc
      - tc
      - nc
      - w
      - m
    roots:
      pm_two_args:
        - msg
        - tell
        - whisper
        - pm
        - message
        - vmessage
        - w
        - m
      pm_one_arg:
        - reply
        - r
        - vreply
      channel_rest:
        - me
        - vme
        - say
        - lc
        - local
        - tc
        - nc
        - g
        - global
        - net
        - network
        - tr
        - trade

  enforcement:
    cooldown_seconds_on_violation: 5
    notify_player_on_block: true
    notify_player_message: "<red>Your message was filtered and not sent.</red>"

  heuristics:
    enabled: true
    rate_limit:
      enabled: true
      capacity: 6
      refill_per_second: 1.0
      action: BLOCK
    duplicate:
      enabled: true
      window_seconds: 10
      action: BLOCK
    links:
      enabled: true
      detect_urls: true
      detect_ip: true
      detect_discord: true
      action: BLOCK

  observability:
    log_violations: true
    log_flags: true
    include_normalized_views: true

  wordlists:
    allow: [ ]
    block: [ ]
    block_embedded: [ ]
    flag: [ ]